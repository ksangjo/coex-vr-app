<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COEX VR 체험 예약</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            color: #212529; /* 기본 글자색을 어두운 색으로 (흰 배경에 흰 글씨 방지) */
            user-select: none;
        }
        .app-container {
            max-width: 820px;        /* 태블릿(가로 약 810px) 기준 */
            min-height: 100vh;
            margin: 0 auto;
            background: #ffffff;     /* 배경과 동일한 순백색으로 이어져 보이게 */
            /* box-shadow 제거: 앱 영역과 배경이 분리되어 보이지 않도록 전체 흰색으로 통일 */
        }
        /* 포인트 컬러: 가벼운 인디고 블루 (#4f6ef7) */

        /* 확인 버튼 등 주요 액션: 파란색으로 꽉 채우고 글자는 흰색 */
        .btn-primary {
            background-color: #4f6ef7 !important;
            border-color: #4f6ef7 !important;
            color: #ffffff !important;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #3d5ce0 !important;
            border-color: #3d5ce0 !important;
        }

        /* 선택형(성별/방문자 유형) 미선택: 회색 테두리 + 검정 글자 */
        .btn-outline-primary {
            color: #212529 !important;
            border-color: #ced4da !important;
            background-color: #ffffff !important;
        }
        /* 선택된 시간 슬롯 한 개만 하늘색 채움 (기본은 흰색) */
        .slot-btn.slot-selected:not(:disabled) {
            background-color: #e8f0ff !important;
            border-color: #4f6ef7 !important;
            color: #4f6ef7 !important;
            font-weight: 600;
        }
        /* 마우스 오버(터치) 시: 검정 글자 유지, 옅은 회색 배경 */
        .btn-outline-primary:hover {
            background-color: #f1f3f5 !important;
            color: #212529 !important;
            border-color: #ced4da !important;
        }
        /* 라디오(성별/방문자 유형) 선택 시: 하늘색 채움 + 파란 테두리 + 검정 글자 */
        .btn-check:checked + .btn-outline-primary {
            background-color: #e8f0ff !important;
            border-color: #4f6ef7 !important;
            color: #212529 !important;
            font-weight: 600;
        }

        /* 시간 슬롯 버튼: 작고 균일하게, 한 줄 유지 */
        .slot-btn {
            font-size: 0.8rem;
            white-space: nowrap;
            padding-left: 0.25rem;
            padding-right: 0.25rem;
        }
        /* 예약 가능한 시간 버튼: 흰 배경 + 검정 글자 + 옅은 테두리 */
        .slot-btn:not(:disabled) {
            background-color: #ffffff !important;
            color: #212529 !important;
            border: 1px solid #ced4da !important;
        }
        .text-primary {
            color: #4f6ef7 !important;
        }
        .progress-bar {
            background-color: #4f6ef7 !important;
        }
        .step-page { display: none; }
        .step-page.active { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; padding: 30px; }
    </style>
</head>
<body>
    <div class="app-container">
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
