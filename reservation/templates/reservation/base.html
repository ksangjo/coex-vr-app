<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COEX VR 체험 예약</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            color: #212529; /* 기본 글자색을 어두운 색으로 (흰 배경에 흰 글씨 방지) */
            user-select: none;
        }
        .app-container {
            max-width: 820px;        /* 태블릿(가로 약 810px) 기준 */
            min-height: 100vh;
            margin: 0 auto;
            background: #ffffff;     /* 배경과 동일한 순백색으로 이어져 보이게 */
            /* box-shadow 제거: 앱 영역과 배경이 분리되어 보이지 않도록 전체 흰색으로 통일 */
        }
        /* 장고 포인트 컬러: 신뢰감을 주는 파란색 계열 커스텀 */
        .btn-primary {
            background-color: #0052cc !important;
            border-color: #0052cc !important;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #0052cc !important;
            border-color: #0052cc !important;
        }
        .btn-outline-primary {
            color: #0052cc !important;
            border-color: #0052cc !important;
        }
        .btn-outline-primary:hover {
            background-color: #0052cc !important;
            color: #ffffff !important;
        }
        /* 라디오(성별/방문자 유형) 선택 시: 파란색으로 채우고 글자는 흰색 */
        .btn-check:checked + .btn-outline-primary {
            background-color: #0052cc !important;
            border-color: #0052cc !important;
            color: #ffffff !important;
        }
        .text-primary {
            color: #0052cc !important;
        }
        .progress-bar {
            background-color: #0052cc !important;
        }
        .step-page { display: none; }
        .step-page.active { display: flex; flex-direction: column; min-height: 100vh; justify-content: center; padding: 30px; }
    </style>
</head>
<body>
    <div class="app-container">
        {% block content %}
        {% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
